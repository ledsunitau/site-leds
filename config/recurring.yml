# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  # error_logs é insert-only e sem teto (RNF-14 pede persistência, não
  # eternidade): 90 dias de retenção, poda diária fora do horário de pico.
  prune_error_logs:
    command: "ErrorLog.where(occurred_at: ...90.days.ago).in_batches.delete_all"
    schedule: every day at 4am
  # RF-LOJ-04: pedido não pago em 1h libera o estoque retido (cancelamento).
  expirar_pedidos:
    class: ExpirarPedidosJob
    schedule: every 15 minutes
  # RF-LOJ-11: atualiza o rastreio dos pedidos enviados (→ entregue).
  rastreio_update:
    class: RastreioUpdateJob
    schedule: every hour
