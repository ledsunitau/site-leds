# PostgreSQL (RNF-02). Toda conexão é dirigida por env vars — no dev/CI os
# defaults abaixo casam com o serviço `db` do docker-compose e com o service
# container do GitHub Actions; em produção o Kamal injeta os valores.
# .presence: uma env var VAZIA (ex.: linha em branco no .env) conta como
# não-configurada e cai no default — senão "" viraria host/usuário vazio.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV["DB_HOST"].presence || "localhost" %>
  port: <%= ENV["DB_PORT"].presence || 5432 %>
  username: <%= ENV["POSTGRES_USER"].presence || "postgres" %>
  password: <%= ENV["POSTGRES_PASSWORD"].presence || "postgres" %>

development:
  <<: *default
  database: site_leds_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: site_leds_test

# Produção usa o layout multi-database do Rails 8: primary + Solid Trifecta
# (cache/queue/cable), todos no MESMO servidor PostgreSQL.
production:
  primary: &primary_production
    <<: *default
    database: site_leds_production
  cache:
    <<: *primary_production
    database: site_leds_production_cache
    migrations_paths: db/cache_migrate
  # queue/cable usam schema Ruby (db/queue_schema.rb, db/cable_schema.rb —
  # formato em que os installers dos gems os mantêm); sem este override o
  # schema_format global :sql procuraria db/*_structure.sql inexistentes e
  # deixaria os bancos vazios no primeiro db:prepare de produção.
  queue:
    <<: *primary_production
    database: site_leds_production_queue
    migrations_paths: db/queue_migrate
    schema_format: ruby
  cable:
    <<: *primary_production
    database: site_leds_production_cable
    migrations_paths: db/cable_migrate
    schema_format: ruby
