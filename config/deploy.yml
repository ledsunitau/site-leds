# Deploy do Sistema LEDS via Kamal 2 (RNF-13). VPS único, Postgres como acessório
# na mesma máquina, Active Storage no Cloudflare R2, SSL do proxy (Let's Encrypt)
# atrás do Cloudflare em modo Full. Segredos vêm de .kamal/secrets (via ENV do
# operador / gerenciador de senha) — NADA sensível é commitado aqui.
#
# ANTES do primeiro deploy, troque os PLACEHOLDERS marcados com "TODO:".

service: site_leds

# ghcr.io/<owner>/<imagem>. TODO: confirme o owner da org.
image: ledsunitau/site_leds

servers:
  web:
    - TODO_IP_DO_VPS # TODO: IP público (ou privado, se atrás do CF) do servidor
  # Fila em processo no Puma (SOLID_QUEUE_IN_PUMA=true). Quando a loja gerar
  # volume, mova para uma máquina de jobs dedicada trocando estas linhas:
  # job:
  #   hosts:
  #     - TODO_IP_DO_VPS
  #   cmd: bin/jobs

# SSL automático (Let's Encrypt) no proxy do Kamal. Com Cloudflare na frente,
# ponha o SSL/TLS em "Full" para cifrar CF↔app.
proxy:
  ssl: true
  host: TODO_DOMINIO # TODO: ex. loja.leds.unitau.br (mesmo valor de APP_HOST)

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# ENV nos containers. secret: resolvido de .kamal/secrets (não commitado).
# clear: valores literais NÃO sensíveis (ficam versionados aqui).
env:
  clear:
    SOLID_QUEUE_IN_PUMA: true
    # host do acessório Postgres na rede docker do Kamal (nome: <service>-db)
    DB_HOST: site_leds-db
    POSTGRES_USER: site_leds
    MELHOR_ENVIO_SANDBOX: false
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - APP_HOST
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - DISCORD_CLIENT_ID
    - DISCORD_CLIENT_SECRET
    - DISCORD_WEBHOOK_URL
    - DISCORD_BOT_TOKEN
    - VAPID_PUBLIC_KEY
    - VAPID_PRIVATE_KEY
    - VAPID_SUBJECT
    - MERCADO_PAGO_ACCESS_TOKEN
    - MERCADO_PAGO_PUBLIC_KEY
    - MERCADO_PAGO_WEBHOOK_SECRET
    - MELHOR_ENVIO_TOKEN
    - MELHOR_ENVIO_CEP_ORIGEM
    - MELHOR_ENVIO_CPF_REMETENTE
    - MELHOR_ENVIO_NOME_REMETENTE
    - MELHOR_ENVIO_LOGRADOURO_REMETENTE
    - MELHOR_ENVIO_NUMERO_REMETENTE
    - MELHOR_ENVIO_CIDADE_REMETENTE
    - MELHOR_ENVIO_UF_REMETENTE
    - SMTP_ADDRESS
    - SMTP_PORT
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - R2_ACCESS_KEY_ID
    - R2_SECRET_ACCESS_KEY
    - R2_ENDPOINT
    - R2_BUCKET

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  # aplica as 4 bases (primary + Solid cache/queue/cable) na primeira subida
  prepare: app exec "bin/rails db:prepare"

# Active Storage vai pro R2; storage local não é usado em produção.

# Assets fingerprintados entre versões, evita 404 em requests em voo.
asset_path: /rails/public/assets

builder:
  arch: amd64
  # assets:precompile roda com SECRET_KEY_BASE_DUMMY=1 no Dockerfile — não
  # precisa de RAILS_MASTER_KEY no build.

# Postgres na mesma máquina, na rede local do Kamal. Volume persistente + backup
# off-server recomendado. As 4 bases do Solid Trifecta vivem neste mesmo servidor.
accessories:
  db:
    image: postgres:17
    host: TODO_IP_DO_VPS # TODO: mesmo servidor (ou um dedicado ao banco)
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: site_leds
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
