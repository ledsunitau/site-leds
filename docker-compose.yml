# Ambiente de desenvolvimento: `docker compose up` sobe Postgres + Rails.
# Produção NÃO usa este arquivo (deploy é via Kamal, ver config/deploy.yml).
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails db:prepare && bin/rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_cache:
